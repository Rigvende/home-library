# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "master"
  path_filters:
    - "!**/*.lock"
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!**/test-results/**"
    - "!**/playwright-report/**"
    - "!**/.playwright-mcp/**"
    - "!docs/CODEBASE_MAP.md"
  path_instructions:
    - path: "src/lib/**"
      instructions: >
        This is the domain layer. Functions must be pure and side-effect free
        (except loadBooks/saveBooks which touch localStorage). Review for
        correctness of type guards, normalisation logic, and immutability.
    - path: "src/components/**"
      instructions: >
        This is a Next.js App Router 'use client' component. Check for
        hydration safety (no direct localStorage/window access during render),
        correct use of useMemo/useEffect dependencies, and accessibility of
        interactive elements.
    - path: "src/lib/__tests__/**"
      instructions: >
        Vitest unit tests. Verify test descriptions are clear, assertions are
        specific, and edge cases are covered for the function under test.
    - path: "tests/e2e/**"
      instructions: >
        Playwright E2E tests. Check that locators are resilient (prefer
        role/label over CSS selectors), localStorage is cleared in beforeEach,
        and each test is fully independent.

chat:
  auto_reply: true
